<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
    <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<script src="https://kit.fontawesome.com/f11ef61e7e.js" crossorigin="anonymous"></script>  
  <title>Frontend Mentor | Calculator app</title>
</head>
<body class="theme-1">
<div class="container theme-1">
  <!-- header -->
  <header >
    <span class="calc">Calc</span>
    <div class="theme-manager">
      <div class="theme">THEME</div>
      <div class="controls">
        <div class="numbers"><span>1</span><span>2</span><span>3</span></div>
        <div class="balls"><span class="theme1"></span><span class="theme2"></span><span class="theme3"></span></div>
      </div>
    </div>
  </header>

  <!-- display -->
  <div class="display">0</div>

  <!-- keys -->

  <div class="keys">
    <button class="btn">7</button>
    <button class="btn">8</button>
    <button class="btn">9</button>
    <button class="btn del">DEL</button>
    <button class="btn">4</button>
    <button class="btn">5</button>
    <button class="btn">6</button>
    <button class="btn operator">+</button>
    <button class="btn">1</button>
    <button class="btn">2</button>
    <button class="btn">3</button>
    <button class="btn operator">-</button>
    <button class="btn">.</button>
    <button class="btn">0</button>
    <button class="btn operator">/</button>
    <button class="btn operator">*</button>
    <button class="btn reset">RESET</button>
    <button class="btn equal">=</button>
  </div>
</div>  
  <script src="index.js"></script>
</body>
</html>
